<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YT embed</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      min-height: 100vh;
      margin: 0;
      background-color: #ca6464;
    }

    h1 {
      margin-bottom: 20px;
    }

    .video-container {
      position: relative;
      width: 800px;
      padding-bottom: 56.25%; /* 16:9 Aspect Ratio */
      height: 0;
    }

    .video-container iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border-radius: 10px;
    }
  </style>
</head>
<body>

  <h1>YT embed</h1>

  <div class="video-container">
    <iframe
      src="https://www.youtube.com/embed/__bHEfJ29j0?si=Ici5hzeMd0z1hVwp"
      title="YouTube video player"
      frameborder="0"
      allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
      allowfullscreen>
    </iframe>
  </div>

</body>
</html>
```

**How to change the video:**

1. Go to any YouTube video
2. Click **Share → Embed**
3. Copy the `src` URL which looks like:
```
   https://www.youtube.com/embed/VIDEO_ID
